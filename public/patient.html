<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Plan Médico</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a}
.app{max-width:480px;margin:0 auto;min-height:100vh;background:#fff}
.top-bar{padding:10px 16px;border-bottom:1px solid #e8e8e8;display:flex;align-items:center;gap:12px;background:#fff;position:sticky;top:0;z-index:10}
.logo-img{height:44px;width:auto;object-fit:contain;flex-shrink:0}
.top-bar-info{flex:1;min-width:0}
.top-bar-name{font-size:13px;font-weight:600;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-bar-sub{font-size:11px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tabs{display:flex;border-bottom:1px solid #e8e8e8;background:#fff;position:sticky;top:63px;z-index:9}
.tab{flex:1;padding:10px 4px;font-size:13px;text-align:center;cursor:pointer;color:#888;border-bottom:2px solid transparent}
.tab.active{color:#1a1a1a;border-bottom:2px solid #1a1a1a;font-weight:600}
.content{padding:16px}
.section{margin-bottom:20px}
.section-title{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px}
.field-label{font-size:11px;color:#888;margin-bottom:3px}
.field-value{font-size:14px;color:#1a1a1a;line-height:1.5}
.field-row{margin-bottom:12px}
.med-card{background:#f8f8f8;border-radius:10px;padding:12px;margin-bottom:10px;border:1px solid #eee}
.med-name{font-size:14px;font-weight:600;margin-bottom:4px;color:#1a1a1a}
.med-detail{font-size:13px;color:#555}
.meal-block{margin-bottom:18px}
.meal-title{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.options-tabs{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.opt-tab{font-size:12px;padding:4px 12px;border-radius:20px;border:1px solid #ddd;cursor:pointer;color:#888;background:transparent;font-family:inherit}
.opt-tab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.opt-content{font-size:13px;color:#444;line-height:1.6;background:#f8f8f8;border-radius:10px;padding:10px 12px;white-space:pre-wrap}
.exercise-day{background:#f8f8f8;border-radius:10px;padding:12px;margin-bottom:10px;border:1px solid #eee}
.day-header{display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.day-title{font-size:13px;font-weight:600;color:#1a1a1a}
.day-type{font-size:11px;padding:3px 9px;border-radius:10px;font-weight:600}
.day-type.fuerza{background:#EBF4FF;color:#1a6cb0}
.day-type.cardio{background:#E6F7EE;color:#1a7a3f}
.day-body{display:none;margin-top:10px}
.day-body.open{display:block}
.ex-table{width:100%;font-size:12px;border-collapse:collapse}
.ex-table th{text-align:left;color:#888;font-weight:600;padding:4px 6px;border-bottom:1px solid #eee;font-size:11px;text-transform:uppercase}
.ex-table td{padding:7px 6px;border-bottom:1px solid #f0f0f0;color:#1a1a1a;vertical-align:top}
.nota-toggle{font-size:11px;color:#1a6cb0;cursor:pointer;padding:2px 0;display:inline-flex;align-items:center;gap:3px;background:none;border:none;font-family:inherit;margin-top:2px}
.nota-body{display:none;margin-top:6px;padding:8px 10px;background:#EBF4FF;border-radius:8px;font-size:12px;color:#1a4f8a;line-height:1.6;border-left:3px solid #1a6cb0}
.nota-body.open{display:block}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.stat-box{background:#f8f8f8;border-radius:10px;padding:10px 12px;border:1px solid #eee}
.stat-label{font-size:11px;color:#888}
.stat-val{font-size:15px;font-weight:600;color:#1a1a1a}
.stat-unit{font-size:11px;color:#aaa;font-weight:400}
.chevron{transition:transform 0.2s;display:inline-block;color:#aaa;font-size:14px}
.chevron.open{transform:rotate(180deg)}
.loading{display:flex;align-items:center;justify-content:center;height:60vh;font-size:14px;color:#888}
.error-view{display:flex;align-items:center;justify-content:center;height:60vh;font-size:14px;color:#c0392b;text-align:center;padding:32px}

.contact-card{background:#f8f8f8;border-radius:14px;padding:20px;margin-bottom:14px;border:1px solid #eee;display:flex;align-items:center;gap:16px}
.contact-icon{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.contact-icon.wa{background:#E6F7EE}
.contact-icon.mail{background:#EBF4FF}
.contact-label{font-size:11px;color:#888;margin-bottom:3px}
.contact-value{font-size:15px;font-weight:600;color:#1a1a1a}
.contact-link{display:block;margin-top:6px;font-size:12px;color:#1a6cb0;text-decoration:none}

.payment-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:#fff}
.payment-logo{height:70px;width:auto;object-fit:contain;margin-bottom:20px}
.payment-title{font-size:20px;font-weight:700;color:#1a1a1a;text-align:center;margin-bottom:6px}
.payment-sub{font-size:13px;color:#888;text-align:center;margin-bottom:32px;line-height:1.6}
.payment-card{width:100%;max-width:380px;background:#f8f8f8;border-radius:16px;padding:24px;border:1px solid #eee;margin-bottom:16px}
.payment-input{width:100%;font-size:15px;padding:12px 14px;border:1px solid #ddd;border-radius:10px;background:#fff;color:#1a1a1a;font-family:inherit;outline:none;margin-bottom:12px}
.payment-input:focus{border-color:#1a6cb0}
.payment-btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:10px}
.btn-paypal{background:#0070BA;color:#fff}
.btn-paypal:active{opacity:0.85}
.btn-code{background:#1a1a1a;color:#fff}
.btn-code:active{opacity:0.85}
.btn-already{background:transparent;color:#1a6cb0;border:1px solid #b3d4f5;font-size:13px;padding:10px}
.payment-error{color:#c0392b;font-size:13px;text-align:center;margin-top:8px;min-height:18px}
.payment-step{font-size:12px;color:#888;text-align:center;margin-bottom:16px}
.code-input{width:100%;font-size:28px;text-align:center;letter-spacing:8px;padding:16px;border:2px solid #ddd;border-radius:10px;background:#fff;font-family:monospace;outline:none;margin-bottom:12px}
.code-input:focus{border-color:#1a6cb0}
.back-link{font-size:13px;color:#888;cursor:pointer;text-align:center;margin-top:8px;text-decoration:underline}

.reminder-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:50;display:flex;align-items:center;justify-content:center;padding:16px}
.reminder-card{background:#fff;border-radius:16px;padding:24px;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.reminder-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.reminder-icon{width:44px;height:44px;background:#EBF4FF;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.reminder-title{font-size:16px;font-weight:700;color:#1a1a1a}
.reminder-sub{font-size:12px;color:#888;margin-top:2px}
.reminder-body{font-size:13px;color:#444;line-height:1.7;margin-bottom:16px}
.reminder-studies{background:#f8f8f8;border-radius:10px;padding:12px;margin-bottom:16px}
.reminder-study{font-size:13px;color:#1a1a1a;padding:4px 0;display:flex;align-items:center;gap:8px}
.reminder-study:before{content:"✓";color:#1a6cb0;font-weight:700;flex-shrink:0}
.reminder-actions{display:flex;flex-direction:column;gap:8px}
.reminder-btn{padding:12px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;text-align:center;text-decoration:none;display:block}
.reminder-btn-blue{background:#1a6cb0;color:#fff}
.reminder-btn-green{background:#1a7a3f;color:#fff}
.reminder-btn-gray{background:#f0f2f5;color:#555;border:1px solid #ddd}
.reminder-close{width:100%;padding:8px;background:transparent;border:none;color:#bbb;font-size:13px;cursor:pointer;margin-top:4px;font-family:inherit}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="top-bar">
    <img class="logo-img" id="logoImg" src="" alt="Dr. Moisés Aceves">
    <div class="top-bar-info">
      <div class="top-bar-name" id="topBarName">Dr. Moisés Aceves</div>
      <div class="top-bar-sub" id="topBarSub">Cardiología clínica y rehabilitación cardiaca</div>
    </div>
  </div>
  <div class="tabs" id="tabsBar" style="display:none">
    <div class="tab active" onclick="switchTab(0)">💊 Receta</div>
    <div class="tab" onclick="switchTab(1)">🥗 Nutrición</div>
    <div class="tab" onclick="switchTab(2)">🫀 Ejercicio</div>
    <div class="tab" onclick="switchTab(3)">📞 Contacto</div>
  </div>
  <div id="mainContent"><div class="loading">Cargando plan...</div></div>
</div>

<script>
var MEAL_LABELS = {desayuno:"Desayuno",colacion_m:"Colacion matutina",comida:"Comida",colacion_v:"Colacion vespertina",cena:"Cena"};
var DATA = null;
var mealOptTabs = {};
var notaOpen = {};
var currentTab = 0;
var PATIENT_ID = location.pathname.split('/').pop();
var userEmail = '';

document.getElementById('logoImg').src = '/logo.png';

// Check if already has access in session
var sessionKey = 'access_' + PATIENT_ID;
var hasAccess = localStorage.getItem(sessionKey) === 'true';

async function init() {
  if (hasAccess) {
    loadPlan();
  } else {
    showPaymentScreen();
  }
}

function showPaymentScreen() {
  document.getElementById('tabsBar').style.display = 'none';
  var mc = document.getElementById('mainContent');
  mc.className = '';
  mc.innerHTML = `<div class="payment-screen">
    <img class="payment-logo" src="/logo.png" alt="Dr. Moises Aceves">
    <div class="payment-title">Plan Cardioprotector</div>
    <div class="payment-sub">Dr. Moisés Aceves<br>Cardiología clínica y rehabilitación cardiaca</div>
    <div class="payment-card">
      <button class="payment-btn btn-paypal" id="payBtn">💳 Pagar plan cardioprotector</button>
      <div class="payment-error" id="payError"></div>
    </div>
    <button class="payment-btn btn-already" id="alreadyBtn">Ya pagué — ingresar código</button>
  </div>`;
  document.getElementById('payBtn').addEventListener('click', handlePay);
  document.getElementById('alreadyBtn').addEventListener('click', showCodeScreen);
}

async function handlePay() {
  document.getElementById('payBtn').textContent = 'Procesando...';
  document.getElementById('payBtn').disabled = true;
  try {
    var resp = await fetch('/api/send-code', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({patientId: PATIENT_ID, email: 'paciente@app.com'})
    });
    var result = await resp.json();
    if (!resp.ok) throw new Error(result.error);
    window.open('https://paypal.me/MOISESACEVES80?locale.x=es_XC&country.x=MX', '_blank');
    showCodeScreen();
  } catch(e) {
    document.getElementById('payBtn').textContent = 'Pagar plan cardioprotector';
    document.getElementById('payBtn').disabled = false;
    document.getElementById('payError').textContent = 'Error: ' + e.message;
  }
}

function showCodeGenerated(code) {
  document.getElementById('mainContent').innerHTML = `<div class="payment-screen">
    <img class="payment-logo" src="/logo.png" alt="Dr. Moises Aceves">
    <div class="payment-title">¡Pago iniciado!</div>
    <div class="payment-sub">Completa el pago en PayPal.<br>Tu médico te enviará el código por WhatsApp.</div>
    <div class="payment-card" style="text-align:center">
      <div style="font-size:13px;color:#888;margin-bottom:12px">Código generado para tu médico:</div>
      <div style="font-size:36px;font-weight:700;letter-spacing:8px;color:#1a4f8a;background:#EBF4FF;border-radius:10px;padding:16px">${code}</div>
      <div style="font-size:12px;color:#aaa;margin-top:10px">Tu médico lo verá y te lo confirmará por WhatsApp</div>
    </div>
    <button class="payment-btn btn-already" onclick="showCodeScreen()" style="margin-top:8px">Ya tengo mi código — acceder</button>
  </div>`;
}

function showCodeScreen() {
  document.getElementById('mainContent').innerHTML = `<div class="payment-screen">
    <img class="payment-logo" src="/logo.png" alt="Dr. Moises Aceves">
    <div class="payment-title">Ingresa tu código</div>
    <div class="payment-sub">Tu médico te enviará el código<br>por WhatsApp al confirmar tu pago</div>
    <div class="payment-card">
      <input class="code-input" id="codeInput" type="tel" maxlength="6" placeholder="000000">
      <button class="payment-btn btn-code" id="verifyBtn">Acceder al plan</button>
      <div class="payment-error" id="codeError"></div>
    </div>
    <div class="back-link" id="backLink">Volver</div>
  </div>`;
  document.getElementById('verifyBtn').addEventListener('click', verifyCode);
  document.getElementById('backLink').addEventListener('click', showPaymentScreen);
}

async function verifyCode() {
  var code = document.getElementById('codeInput').value.trim();
  var err = document.getElementById('codeError');
  if (!code || code.length < 6) { err.textContent = 'Ingresa el código de 6 dígitos'; return; }
  document.getElementById('verifyBtn').textContent = 'Verificando...';
  document.getElementById('verifyBtn').disabled = true;
  try {
    var resp = await fetch('/api/verify-code', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({patientId: PATIENT_ID, email: 'paciente@app.com', code: code})
    });
    var result = await resp.json();
    if (!resp.ok) throw new Error(result.error);
    localStorage.setItem(sessionKey, 'true');
    loadPlan();
  } catch(e) {
    document.getElementById('verifyBtn').textContent = 'Acceder al plan';
    document.getElementById('verifyBtn').disabled = false;
    err.textContent = 'Código incorrecto';
  }
}

async function loadPlan() {
  try {
    var resp = await fetch('/api/patients/' + PATIENT_ID);
    if (!resp.ok) throw new Error('not found');
    var result = await resp.json();
    DATA = result.data;
    document.getElementById('topBarName').textContent = (DATA.doctor && DATA.doctor.name) || 'Dr. Moises Aceves';
    document.getElementById('topBarSub').textContent = (DATA.doctor && DATA.doctor.esp) || 'Cardiologia clinica y rehabilitacion cardiaca';
    document.getElementById('tabsBar').style.display = 'flex';
    renderTab(0);
    checkReminders();
  } catch(e) {
    document.getElementById('mainContent').innerHTML = '<div class="error-view">Plan no encontrado.</div>';
  }
}

function checkReminders() {
  if (!DATA.reminders || !DATA.reminders.length) return;
  var now = new Date();
  var planStart = new Date(DATA.planStart || Date.now());
  DATA.reminders.forEach(function(r) {
    if (!r.active) return;
    var reminderDate;
    if (r.type === 'days') {
      reminderDate = new Date(planStart.getTime() + r.days * 24 * 60 * 60 * 1000);
    } else if (r.type === 'date') {
      reminderDate = new Date(r.date);
    }
    if (!reminderDate) return;
    var dismissKey = 'dismissed_' + PATIENT_ID + '_' + r.id;
    if (localStorage.getItem(dismissKey)) return;
    if (now >= reminderDate) {
      showReminder(r, reminderDate, dismissKey);
    }
  });
}

function showReminder(r, reminderDate, dismissKey) {
  var daysDiff = Math.floor((new Date() - reminderDate) / (1000 * 60 * 60 * 24));
  var timeText = daysDiff === 0 ? 'Hoy' : 'Han pasado ' + (r.type === 'days' ? r.days + ' días' : daysDiff + ' días');

  var studiesHtml = '';
  if (r.studies && r.studies.length) {
    r.studies.forEach(function(s) {
      studiesHtml += '<div class="reminder-study">' + s + '</div>';
    });
  }

  var actionsHtml = '';
  var waBase = 'https://wa.me/5215611716317?text=';
  if (r.actions && r.actions.valoracion) {
    var msg1 = encodeURIComponent('Hola Dr. Aceves, adjunto mis resultados para completar mi valoración.');
    actionsHtml += '<a class="reminder-btn reminder-btn-blue" href="' + waBase + msg1 + '" target="_blank">📋 Enviar resultados para completar mi valoración</a>';
  }
  if (r.actions && r.actions.actualizar) {
    var msg2 = encodeURIComponent('Hola Dr. Aceves, adjunto mis resultados para actualizar mi plan.');
    actionsHtml += '<a class="reminder-btn reminder-btn-blue" href="' + waBase + msg2 + '" target="_blank">🔄 Enviar resultados para actualizar mi plan</a>';
  }
  if (r.actions && r.actions.cita) {
    var msg3 = encodeURIComponent('Hola Dr. Aceves, me gustaría agendar mi cita de seguimiento.');
    actionsHtml += '<a class="reminder-btn reminder-btn-green" href="' + waBase + msg3 + '" target="_blank">📅 Agendar cita de seguimiento</a>';
  }

  var overlay = document.createElement('div');
  overlay.className = 'reminder-overlay';
  overlay.id = 'reminderOverlay';
  overlay.innerHTML = '<div class="reminder-card">' +
    '<div class="reminder-header">' +
    '<div class="reminder-icon">🔔</div>' +
    '<div><div class="reminder-title">Recordatorio de seguimiento</div>' +
    '<div class="reminder-sub">' + timeText + ' desde tu Plan Cardioprotector</div></div>' +
    '</div>' +
    '<div class="reminder-body">' + (r.message || 'Es momento de realizar tus estudios de seguimiento.') + '</div>' +
    (studiesHtml ? '<div class="reminder-studies">' + studiesHtml + '</div>' : '') +
    '<div class="reminder-actions">' + actionsHtml + '</div>' +
    '<button class="reminder-close" onclick="dismissReminder('' + dismissKey + '')">Cerrar recordatorio</button>' +
    '</div>';
  document.body.appendChild(overlay);
}

function dismissReminder(key) {
  localStorage.setItem(key, 'true');
  var el = document.getElementById('reminderOverlay');
  if (el) el.remove();
}

function switchTab(i) {
  currentTab = i;
  document.querySelectorAll('.tab').forEach(function(t,idx){ t.classList.toggle('active', idx===i); });
  renderTab(i);
}

function renderTab(i) {
  var mc = document.getElementById('mainContent');
  mc.className = 'content';
  if (i===0) mc.innerHTML = renderReceta();
  if (i===1) mc.innerHTML = renderNutricion();
  if (i===2) mc.innerHTML = renderEjercicio();
  if (i===3) mc.innerHTML = renderContacto();
  bindEvents();
}

function bindEvents() {
  document.querySelectorAll('[data-meal-key]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      mealOptTabs[this.getAttribute('data-meal-key')] = parseInt(this.getAttribute('data-meal-idx'));
      renderTab(currentTab);
    });
  });
  document.querySelectorAll('[data-toggle-day]').forEach(function(el) {
    el.addEventListener('click', function() {
      var i = this.getAttribute('data-toggle-day');
      var body = document.getElementById('dayBody'+i);
      var chev = document.getElementById('chev'+i);
      if (body) body.classList.toggle('open');
      if (chev) chev.classList.toggle('open');
    });
  });
  document.querySelectorAll('[data-toggle-nota]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var id = this.getAttribute('data-toggle-nota');
      notaOpen[id] = !notaOpen[id];
      var body = document.getElementById('nota-'+id);
      if (body) {
        body.classList.toggle('open', notaOpen[id]);
        this.textContent = notaOpen[id] ? 'Ocultar nota tecnica' : 'Ver nota tecnica';
      }
    });
  });
}

function val(v) { return v || '—'; }

function renderReceta() {
  var d = DATA;
  var meds = '';
  d.meds.filter(function(m){ return m.name; }).forEach(function(m) {
    meds += '<div class="med-card"><div class="med-name">' + m.name + '</div>';
    meds += '<div class="med-detail">' + val(m.dose) + ' - ' + val(m.freq) + '</div>';
    if (m.notes) meds += '<div class="med-detail" style="margin-top:4px;color:#888">' + m.notes + '</div>';
    meds += '</div>';
  });
  if (!meds) meds = '<div class="med-card"><div class="med-detail">Sin medicamentos prescritos</div></div>';
  var html = '<div class="section"><div class="section-title">Paciente</div>';
  html += '<div class="field-row"><div class="field-label">Nombre</div><div class="field-value">' + val(d.patient.name) + '</div></div>';
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
  html += '<div><div class="field-label">Edad</div><div class="field-value">' + val(d.patient.age) + '</div></div>';
  html += '<div><div class="field-label">Peso / Talla</div><div class="field-value">' + val(d.patient.weight) + ' - ' + val(d.patient.height) + '</div></div>';
  html += '</div>';
  html += '<div class="field-row" style="margin-top:8px"><div class="field-label">Diagnostico</div><div class="field-value">' + val(d.patient.dx) + '</div></div>';
  html += '</div>';
  html += '<div class="section"><div class="section-title">Medicamentos</div>' + meds + '</div>';
  if (d.indications) html += '<div class="section"><div class="section-title">Indicaciones especiales</div><div class="field-value" style="font-size:13px;line-height:1.6;color:#444">' + d.indications + '</div></div>';
  return html;
}

function renderNutricion() {
  var n = DATA.nutrition;
  var keys = ['desayuno','colacion_m','comida','colacion_v','cena'];
  var meals = '';
  keys.forEach(function(key) {
    var opts = n.meals[key];
    if (!mealOptTabs[key]) mealOptTabs[key] = 0;
    var cur = mealOptTabs[key];
    var tabBtns = '';
    for (var i=0; i<4; i++) {
      tabBtns += '<button class="opt-tab ' + (cur===i?'active':'') + '" data-meal-key="' + key + '" data-meal-idx="' + i + '">Op. ' + (i+1) + '</button>';
    }
    meals += '<div class="meal-block"><div class="meal-title">' + MEAL_LABELS[key] + '</div>';
    meals += '<div class="options-tabs">' + tabBtns + '</div>';
    meals += '<div class="opt-content">' + (opts[cur] || '<span style="color:#bbb">Sin contenido</span>') + '</div></div>';
  });
  var statsData = [['Energia',n.kcal,'kcal/dia'],['Proteina',n.protein,'g/dia'],['Hidratos',n.carbs,'g/dia'],['Grasas',n.fat,'%'],['Fibra',n.fiber,'g/dia'],['Sodio',n.sodium,'g/dia']];
  var html = '<div class="section"><div class="section-title">Requerimientos diarios</div><div class="stat-grid">';
  statsData.forEach(function(s) {
    html += '<div class="stat-box"><div class="stat-label">' + s[0] + '</div><div class="stat-val">' + (s[1]||'—') + ' <span class="stat-unit">' + s[2] + '</span></div></div>';
  });
  html += '</div><div class="stat-box"><div class="stat-label">Liquidos</div><div class="stat-val">' + (n.liquids||'—') + ' <span class="stat-unit">L/dia</span></div></div></div>';
  html += '<div class="section"><div class="section-title">Plan de alimentacion</div>' + meals + '</div>';
  if (n.goals) html += '<div class="section"><div class="section-title">Objetivos</div><div class="field-value" style="font-size:13px;line-height:1.7;color:#444">' + n.goals + '</div></div>';
  return html;
}

function renderEjercicio() {
  var ex = DATA.exercise;
  var days = '';
  ex.days.forEach(function(day, di) {
    var rows = '';
    day.exercises.filter(function(r){ return r[0]; }).forEach(function(row, ri) {
      var id = di + '-' + ri;
      var nota = row[4] || '';
      var isOpen = notaOpen[id] || false;
      rows += '<tr><td><div>' + row[0] + '</div>';
      if (nota) {
        rows += '<button class="nota-toggle" id="notabtn-' + id + '" data-toggle-nota="' + id + '">' + (isOpen?'Ocultar nota':'Ver nota tecnica') + '</button>';
        rows += '<div class="nota-body ' + (isOpen?'open':'') + '" id="nota-' + id + '">' + nota + '</div>';
      }
      rows += '</td><td style="text-align:center">' + (row[1]||'—') + '</td><td style="text-align:center">' + (row[2]||'—') + '</td><td style="text-align:center">' + (row[3]||'—') + '</td></tr>';
    });
    var typeLabel = day.type === 'fuerza' ? 'Fuerza' : 'Cardio';
    days += '<div class="exercise-day"><div class="day-header" data-toggle-day="' + di + '">';
    days += '<span class="day-title">' + day.title + '</span>';
    days += '<div style="display:flex;align-items:center;gap:8px"><span class="day-type ' + day.type + '">' + typeLabel + '</span><span class="chevron" id="chev' + di + '">v</span></div>';
    days += '</div><div class="day-body" id="dayBody' + di + '"><table class="ex-table"><tr><th>Ejercicio</th><th>Series</th><th>Reps</th><th>RPE</th></tr>' + rows + '</table></div></div>';
  });
  var html = '<div class="section"><div class="section-title">Programa semanal</div>' + days + '</div>';
  if (ex.weeks) html += '<div class="section"><div class="section-title">Duracion</div><div class="field-value">Programa de <strong>' + ex.weeks + '</strong> semanas</div></div>';
  return html;
}
