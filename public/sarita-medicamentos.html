<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Mis Medicamentos — Doña Sarita</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #FDF6EE;
  color: #2D2D2D;
  min-height: 100vh;
}

.app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  background: #FDF6EE;
}

/* HEADER */
.header {
  background: #C0303A;
  padding: 20px 20px 24px;
  text-align: center;
}
.header-greeting {
  font-size: 13px;
  color: rgba(255,255,255,0.75);
  margin-bottom: 4px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.header-name {
  font-size: 26px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 2px;
}
.header-date {
  font-size: 13px;
  color: rgba(255,255,255,0.7);
}

/* CURRENT TIME BANNER */
.time-banner {
  background: #1A2D5A;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.time-label {
  font-size: 12px;
  color: rgba(255,255,255,0.6);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.time-current {
  font-size: 28px;
  font-weight: 700;
  color: #fff;
  font-variant-numeric: tabular-nums;
}
.next-pill {
  text-align: right;
}
.next-label {
  font-size: 11px;
  color: rgba(255,255,255,0.6);
}
.next-time {
  font-size: 16px;
  font-weight: 600;
  color: #FFD166;
}

/* SCHEDULE */
.schedule {
  padding: 16px;
}
.schedule-title {
  font-size: 11px;
  font-weight: 600;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 14px;
  padding-left: 4px;
}

.slot {
  background: #fff;
  border-radius: 16px;
  padding: 16px 18px;
  margin-bottom: 10px;
  border: 2px solid transparent;
  display: flex;
  gap: 14px;
  align-items: flex-start;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}

.slot.past {
  opacity: 0.45;
  background: #f5f5f5;
}

.slot.current {
  border-color: #C0303A;
  background: #fff;
  box-shadow: 0 4px 20px rgba(192,48,58,0.15);
}

.slot.current::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  background: #C0303A;
  border-radius: 4px 0 0 4px;
}

.slot.upcoming {
  border-color: #e8e8e8;
}

.slot-time-col {
  flex-shrink: 0;
  text-align: center;
  min-width: 54px;
}

.slot-time {
  font-size: 20px;
  font-weight: 700;
  color: #1A2D5A;
  font-variant-numeric: tabular-nums;
  line-height: 1;
}

.slot.past .slot-time { color: #aaa; }
.slot.current .slot-time { color: #C0303A; }

.slot-ampm {
  font-size: 10px;
  color: #aaa;
  font-weight: 600;
  margin-top: 2px;
  text-transform: uppercase;
}

.slot-divider {
  width: 1px;
  background: #eee;
  align-self: stretch;
  flex-shrink: 0;
}

.slot-content {
  flex: 1;
}

.slot-status {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 6px;
}
.slot.current .slot-status { color: #C0303A; }
.slot.upcoming .slot-status { color: #1A2D5A; }
.slot.past .slot-status { color: #aaa; }

.med-list {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.med-item {
  display: flex;
  align-items: center;
  gap: 8px;
}

.med-icon {
  font-size: 16px;
  flex-shrink: 0;
}

.med-name {
  font-size: 15px;
  font-weight: 600;
  color: #2D2D2D;
  line-height: 1.3;
}

.slot.past .med-name { color: #aaa; }

.med-note {
  font-size: 12px;
  color: #888;
  margin-top: 1px;
}

/* TAKEN BUTTON */
.taken-btn {
  margin-top: 10px;
  width: 100%;
  padding: 10px;
  background: #C0303A;
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.taken-btn.done {
  background: #E6F7EE;
  color: #1a7a3f;
}

/* NOTIFICATION PERMISSION */
.notif-banner {
  background: #EBF4FF;
  border-radius: 12px;
  padding: 14px 16px;
  margin: 0 16px 16px;
  display: flex;
  gap: 12px;
  align-items: center;
}
.notif-icon { font-size: 24px; flex-shrink: 0; }
.notif-text { font-size: 13px; color: #1a4f8a; line-height: 1.5; flex: 1; }
.notif-btn {
  padding: 8px 14px;
  background: #1A2D5A;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  flex-shrink: 0;
}

/* TOAST */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: #1A2D5A;
  color: #fff;
  padding: 12px 24px;
  border-radius: 24px;
  font-size: 14px;
  font-weight: 500;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  z-index: 100;
  white-space: nowrap;
}
.toast.show { opacity: 1; }

/* FOOTER */
.footer {
  text-align: center;
  padding: 16px;
  font-size: 11px;
  color: #bbb;
  line-height: 1.8;
}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-greeting">Horario de medicamentos</div>
    <div class="header-name">Doña Sarita 💊</div>
    <div class="header-date" id="headerDate"></div>
  </div>

  <div class="time-banner">
    <div>
      <div class="time-label">Hora actual</div>
      <div class="time-current" id="clockDisplay">--:--</div>
    </div>
    <div class="next-pill">
      <div class="next-label">Próxima toma</div>
      <div class="next-time" id="nextPill">--:--</div>
    </div>
  </div>

  <div id="notifBanner" style="display:none" class="notif-banner">
    <div class="notif-icon">🔔</div>
    <div class="notif-text">Activa las alertas para recibir recordatorios a tiempo</div>
    <button class="notif-btn" onclick="requestNotifications()">Activar</button>
  </div>

  <div class="schedule">
    <div class="schedule-title">Tomas del día</div>
    <div id="scheduleList"></div>
  </div>

  <div class="footer">
    Dr. Moisés Aceves · Cardiología<br>
    WhatsApp 56 1171 6317
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var SCHEDULE = [
  {
    time: '06:00',
    hour: 6,
    min: 0,
    meds: [
      { icon: '💊', name: 'Levotiroxina', note: 'En ayunas, 30 min antes del desayuno' }
    ]
  },
  {
    time: '10:00',
    hour: 10,
    min: 0,
    meds: [
      { icon: '🍳', name: 'Desayuno', note: '' },
      { icon: '🦴', name: 'Caltrate 600 × 2', note: 'Con el desayuno' },
      { icon: '💧', name: 'Hidroclorotiazida', note: 'Con el desayuno' },
      { icon: '❤️', name: 'Nifedipino 30 mg', note: 'Con el desayuno' }
    ]
  },
  {
    time: '12:00',
    hour: 12,
    min: 0,
    meds: [
      { icon: '💊', name: 'C-Tech × 3', note: 'Carbonato de calcio' },
      { icon: '☀️', name: 'Calcitriol × 1', note: '' }
    ]
  },
  {
    time: '14:00',
    hour: 14,
    min: 0,
    meds: [
      { icon: '🍽️', name: 'Comida', note: '' },
      { icon: '🫧', name: 'Tums × 1', note: 'Con la comida' }
    ]
  },
  {
    time: '16:00',
    hour: 16,
    min: 0,
    meds: [
      { icon: '💊', name: 'C-Tech × 3', note: 'Carbonato de calcio' }
    ]
  },
  {
    time: '20:00',
    hour: 20,
    min: 0,
    meds: [
      { icon: '🌙', name: 'Cena', note: '' },
      { icon: '🦴', name: 'Caltrate 600 × 2', note: 'Con la cena' },
      { icon: '🫧', name: 'Tums × 1', note: 'Con la cena' }
    ]
  },
  {
    time: '21:00',
    hour: 21,
    min: 0,
    meds: [
      { icon: '💊', name: 'C-Tech × 3', note: 'Carbonato de calcio' }
    ]
  },
  {
    time: '22:00',
    hour: 22,
    min: 0,
    meds: [
      { icon: '🥛', name: 'Colación', note: '' },
      { icon: '🦴', name: 'Caltrate 600 × 2', note: 'Con la colación' }
    ]
  }
];

var takenKey = 'sarita_taken_' + new Date().toDateString();
var taken = JSON.parse(localStorage.getItem(takenKey) || '{}');

function getMinutes(h, m) { return h * 60 + m; }

function getNow() {
  var now = new Date();
  return { h: now.getHours(), m: now.getMinutes(), total: getMinutes(now.getHours(), now.getMinutes()) };
}

function getSlotStatus(slot) {
  var now = getNow();
  var slotMin = getMinutes(slot.hour, slot.min);
  var diff = slotMin - now.total;
  if (diff < -30) return 'past';
  if (diff >= -30 && diff <= 30) return 'current';
  return 'upcoming';
}

function getNextSlot() {
  var now = getNow();
  for (var i = 0; i < SCHEDULE.length; i++) {
    var s = SCHEDULE[i];
    var slotMin = getMinutes(s.hour, s.min);
    if (slotMin > now.total) return s.time;
  }
  return 'Completado 🎉';
}

function formatAmPm(h) {
  return h < 12 ? 'AM' : 'PM';
}

function renderSchedule() {
  var list = document.getElementById('scheduleList');
  var html = '';
  SCHEDULE.forEach(function(slot, idx) {
    var status = getSlotStatus(slot);
    var isTaken = taken[idx];
    var statusLabel = status === 'current' ? '⏰ Ahora' : status === 'past' ? (isTaken ? '✓ Tomado' : 'Ya pasó') : 'Próximamente';
    
    var medsHtml = slot.meds.map(function(m) {
      return '<div class="med-item"><span class="med-icon">' + m.icon + '</span><div><div class="med-name">' + m.name + '</div>' + (m.note ? '<div class="med-note">' + m.note + '</div>' : '') + '</div></div>';
    }).join('');

    var btnHtml = '';
    if (status === 'current' || status === 'upcoming') {
      if (isTaken) {
        btnHtml = '<button class="taken-btn done" disabled>✓ Tomado</button>';
      } else if (status === 'current') {
        btnHtml = '<button class="taken-btn" data-idx="' + idx + '" onclick="markTaken(' + idx + ')">✓ Ya tomé mis medicamentos</button>';
      }
    }

    html += '<div class="slot ' + status + '" id="slot-' + idx + '">';
    html += '<div class="slot-time-col">';
    html += '<div class="slot-time">' + slot.time + '</div>';
    html += '<div class="slot-ampm">' + formatAmPm(slot.hour) + '</div>';
    html += '</div>';
    html += '<div class="slot-divider"></div>';
    html += '<div class="slot-content">';
    html += '<div class="slot-status">' + statusLabel + '</div>';
    html += '<div class="med-list">' + medsHtml + '</div>';
    html += btnHtml;
    html += '</div></div>';
  });
  list.innerHTML = html;

  // Scroll to current
  var currentEl = document.querySelector('.slot.current');
  if (currentEl) {
    setTimeout(function() {
      currentEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 300);
  }
}

function markTaken(idx) {
  taken[idx] = true;
  localStorage.setItem(takenKey, JSON.stringify(taken));
  renderSchedule();
  showToast('¡Muy bien Doña Sarita! 💪');
}

function updateClock() {
  var now = new Date();
  var h = now.getHours().toString().padStart(2, '0');
  var m = now.getMinutes().toString().padStart(2, '0');
  document.getElementById('clockDisplay').textContent = h + ':' + m;
  document.getElementById('nextPill').textContent = getNextSlot();
}

function updateDate() {
  var days = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  var months = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  var now = new Date();
  document.getElementById('headerDate').textContent = days[now.getDay()] + ', ' + now.getDate() + ' de ' + months[now.getMonth()];
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 3000);
}

function requestNotifications() {
  if ('Notification' in window) {
    Notification.requestPermission().then(function(perm) {
      if (perm === 'granted') {
        document.getElementById('notifBanner').style.display = 'none';
        showToast('✓ Alertas activadas');
        scheduleNotifications();
      }
    });
  }
}

function scheduleNotifications() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  var now = new Date();
  SCHEDULE.forEach(function(slot, idx) {
    var target = new Date();
    target.setHours(slot.hour, slot.min, 0, 0);
    var diff = target - now;
    if (diff > 0) {
      setTimeout(function() {
        if (!taken[idx]) {
          new Notification('💊 Doña Sarita — ' + slot.time, {
            body: slot.meds.map(function(m) { return m.name; }).join('\n'),
            icon: '/logo.png'
          });
        }
      }, diff);
    }
  });
}

function checkNotifPermission() {
  if ('Notification' in window && Notification.permission === 'default') {
    document.getElementById('notifBanner').style.display = 'flex';
  } else if ('Notification' in window && Notification.permission === 'granted') {
    scheduleNotifications();
  }
}

// Init
updateDate();
updateClock();
renderSchedule();
checkNotifPermission();

// Update clock every minute, re-render every 5 min
setInterval(updateClock, 60000);
setInterval(renderSchedule, 300000);
</script>
</body>
</html>
